<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Explorer: Quantum Quiz - Game Edukasi Fisika SMA</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #03071e 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', 'Monaco', monospace;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-radius: 48px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.4), 0 20px 35px rgba(0,0,0,0.5);
            cursor: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            width: 900px;
            margin-bottom: 16px;
            background: #0b0e1abe;
            backdrop-filter: blur(8px);
            padding: 10px 25px;
            border-radius: 60px;
            color: #f0f3ff;
            text-shadow: 0 0 3px cyan;
            font-weight: bold;
            font-size: 1.4rem;
            border: 1px solid #4affb5;
        }

        .score-board, .health-board {
            background: #000000aa;
            padding: 6px 20px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        .score-board span, .health-board span {
            color: #ffd966;
            font-size: 1.8rem;
            margin-left: 12px;
        }

        .controls-hint {
            margin-top: 12px;
            font-size: 0.85rem;
            background: #12141caa;
            padding: 6px 18px;
            border-radius: 60px;
            color: #b9e6ff;
        }

        button {
            background: #ffb347;
            border: none;
            font-family: inherit;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            font-size: 1rem;
        }
        button:hover {
            background: #ff9f1c;
            transform: scale(1.02);
            box-shadow: 0 0 8px orange;
        }

        @media (max-width: 960px) {
            .info-panel { width: 95%; font-size: 1rem; }
            .score-board span, .health-board span { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="info-panel">
            <div class="score-board">✨ PENGETAHUAN POIN <span id="scoreValue">0</span></div>
            <div class="health-board">🛡️ SISA NYAWA <span id="healthValue">3</span></div>
        </div>
        <canvas id="gameCanvas" width="900" height="550"></canvas>
        <div class="controls-hint">
            🖱️ GERAKAN MOUSE (kiri/kanan) | 🔫 KLIK KIRI / TAP untuk MENEMBAK | 🧠 JAWAB QUIZ FISIKA
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- KONFIGURASI CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Ukuran canvas
        const CW = 900;
        const CH = 550;
        canvas.width = CW;
        canvas.height = CH;

        // Elemen UI
        const scoreSpan = document.getElementById('scoreValue');
        const healthSpan = document.getElementById('healthValue');

        // ---------- VARIABEL GAME ----------
        let score = 0;          // poin pengetahuan
        let health = 3;         // nyawa
        let gameRunning = true;
        let animationId = null;

        // Pesawat player
        const PLAYER_WIDTH = 36;
        const PLAYER_HEIGHT = 36;
        let playerX = CW/2 - PLAYER_WIDTH/2;
        let playerY = CH - 70;

        // Array peluru & asteroid
        let bullets = [];
        let asteroids = [];

        // Efek ledakan sederhana (array of {x, y, life})
        let explosions = [];

        // ----- SISTEM QUIZ (aktif hanya jika asteroid ditembak)
        let activeQuiz = null;   // null = tidak ada quiz, jika ada objek: { asteroidId, question, options, correct, x, y }
        let waitingForAnswer = false;

        // Timer spawn asteroid
        let spawnCounter = 0;
        const SPAWN_RATE = 55;   // frame antar spawn (makin kecil makin sering)

        // variabel untuk mouse position (X player)
        let mouseX = CW/2;
        let mouseInside = true;

        // ----- BANK SOAL FISIKA SMA (menambah pengetahuan)
        const questionBank = [
            { text: "Satuan dari gaya dalam SI adalah...", options: ["Newton", "Joule", "Watt", "Pascal"], correct: 0 },
            { text: "Hukum I Newton disebut juga hukum...", options: ["Kelembaman", "Aksi Reaksi", "Gravitasi", "Usaha"], correct: 0 },
            { text: "Percepatan gravitasi di permukaan bumi kira-kira...", options: ["9,8 m/s²", "3,0 x 10^8 m/s", "6,67 x 10^-11 N", "1,6 m/s²"], correct: 0 },
            { text: "Besaran berikut yang termasuk vektor adalah...", options: ["Kecepatan", "Massa", "Suhu", "Waktu"], correct: 0 },
            { text: "Bunyi Hukum II Newton: F = m . a , artinya...", options: ["Percepatan sebanding gaya", "Gaya sebanding massa", "Aksi = reaksi", "Energi kekal"], correct: 0 },
            { text: "Energi kinetik bergantung pada...", options: ["Massa & kecepatan", "Massa & ketinggian", "Gaya & jarak", "Tekanan & volume"], correct: 0 },
            { text: "Satuan energi dalam sistem SI adalah...", options: ["Joule", "Watt", "Kg.m/s", "Dyne"], correct: 0 },
            { text: "Hukum Kekekalan Energi mekanik berlaku jika...", options: ["Hanya gaya konservatif", "Ada gesekan", "Benda diam", "Suhu tinggi"], correct: 0 },
            { text: "Impuls didefinisikan sebagai...", options: ["Perubahan momentum", "Gaya kali waktu", "Massa kali kecepatan", "Energi kinetik"], correct: 0 },
            { text: "Sebuah mobil bermassa 1000 kg bergerak 20 m/s. Momentumnya...", options: ["20000 kg.m/s", "2000 kg.m/s", "500 kg.m/s", "10000 kg.m/s"], correct: 0 }
        ];

        // helper ambil soal random
        function getRandomQuestion() {
            const idx = Math.floor(Math.random() * questionBank.length);
            return { ...questionBank[idx] }; // copy
        }

        // ----- UPDATE UI SKOR & NYAWA
        function updateUI() {
            scoreSpan.innerText = score;
            healthSpan.innerText = health;
        }

        // ----- RESPAWN / GAME OVER
        function gameOver() {
            gameRunning = false;
            if(animationId) cancelAnimationFrame(animationId);
            ctx.font = "bold 32m 'Courier New'";
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#FFD966";
            ctx.shadowColor = "black";
            ctx.fillText("💀 GAME OVER 💀", CW/2-150, CH/2-50);
            ctx.font = "20px monospace";
            ctx.fillStyle = "white";
            ctx.fillText("Klik F5 atau refresh untuk bermain lagi", CW/2-200, CH/2+40);
        }

        // kurangi nyawa + reset jika nyawa habis
        function reduceHealth() {
            if(!gameRunning) return;
            health--;
            updateUI();
            if(health <= 0) {
                health = 0;
                updateUI();
                gameOver();
            } else {
                // efek shock: ledakan kecil di pesawat
                explosions.push({ x: playerX+PLAYER_WIDTH/2, y: playerY+PLAYER_HEIGHT/2, life: 12 });
            }
        }

        // tambah poin
        function addPoints(val) {
            score += val;
            updateUI();
        }

        // ----- LOGIKA QUIZ (dipanggil saat asteroid hancur)
        function showQuizForAsteroid(asteroid, asteroidId) {
            if(!gameRunning) return;
            if(waitingForAnswer) return; // jangan double quiz
            
            const qData = getRandomQuestion();
            activeQuiz = {
                asteroidId: asteroidId,
                question: qData.text,
                options: qData.options,
                correct: qData.correct,
                x: asteroid.x + asteroid.width/2,
                y: asteroid.y + asteroid.height/2 - 20
            };
            waitingForAnswer = true;
            // pause gerakan game? tidak usah pause, tetapi interaksi mouse terbatas sementara kita blok tembak (agar jawab dulu)
        }

        // Fungsi menjawab: user memilih index 0..3
        function answerQuiz(selectedIdx) {
            if(!waitingForAnswer || !activeQuiz) return;
            const isCorrect = (selectedIdx === activeQuiz.correct);
            if(isCorrect) {
                // jawab benar +50 poin, plus efek keren
                addPoints(50);
                explosions.push({ x: activeQuiz.x, y: activeQuiz.y, life: 18 });
                // kita juga beri feedback visual di canvas nanti
            } else {
                // jawab salah: kurangi nyawa 1, karena gagal menjawab dengan benar (penalti akademik)
                reduceHealth();
                explosions.push({ x: activeQuiz.x, y: activeQuiz.y, life: 12 });
            }
            // Tutup quiz apapun hasilnya
            waitingForAnswer = false;
            activeQuiz = null;
        }

        // ----- OBJEK GAME -----
        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.w = 5;
                this.h = 12;
                this.speed = -7;
            }
            update() {
                this.y += this.speed;
            }
            draw() {
                ctx.fillStyle = "#F0F921";
                ctx.shadowBlur = 8;
                ctx.shadowColor = "cyan";
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
        }

        class Asteroid {
            constructor(x, y, sizeW, sizeH) {
                this.x = x;
                this.y = y;
                this.width = sizeW;
                this.height = sizeH;
                this.speedY = 2.2 + Math.random() * 2.5;
                this.id = Math.random() + performance.now() + Math.random();
            }
            update() {
                this.y += this.speedY;
            }
            draw() {
                ctx.fillStyle = "#6F4E37";
                ctx.shadowBlur = 5;
                ctx.shadowColor = "brown";
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 8);
                ctx.fill();
                ctx.fillStyle = "#4A2E1E";
                ctx.beginPath();
                ctx.roundRect(this.x+5, this.y+5, this.width-10, 5, 3);
                ctx.fill();
                ctx.fillStyle = "#AB8E6A";
                ctx.font = "bold 14px monospace";
                ctx.fillText("☄️", this.x+this.width/2-8, this.y+this.height/2+5);
            }
        }

        // helper roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }

        // ----- SPAWN ASTEROID -----
        function spawnAsteroid() {
            let w = 42 + Math.random() * 18;
            let h = 40 + Math.random() * 15;
            let x = Math.random() * (CW - w - 20) + 10;
            asteroids.push(new Asteroid(x, -h, w, h));
        }

        // ----- UPDATE & COLLISION -----
        function updateGame() {
            if(!gameRunning) return;

            // 1. Update player position mengikuti mouse (batas)
            let targetX = mouseX - PLAYER_WIDTH/2;
            targetX = Math.min(Math.max(targetX, 5), CW - PLAYER_WIDTH - 5);
            playerX = targetX;

            // 2. Update bullets
            for(let i=0; i<bullets.length; i++) {
                bullets[i].update();
                if(bullets[i].y + bullets[i].h < 0 || bullets[i].y > CH) {
                    bullets.splice(i,1);
                    i--;
                }
            }

            // 3. Update asteroid & collision bullet-asteroid (jika tidak dalam quiz, jika dalam quiz tidak ada collision baru agar fokus)
            for(let i=0; i<asteroids.length; i++) {
                const a = asteroids[i];
                a.update();
                // cek collision dengan bullet (hanya jika tidak ada quiz aktif? Biarkan saja, tapi jika quiz active, asteroid tetap bergerak namun tabrakan bullet tidak memicu quiz baru? aturan: jika waitingForAnswer true jangan proses hancur asteroid
                if(!waitingForAnswer) {
                    for(let j=0; j<bullets.length; j++) {
                        const b = bullets[j];
                        if(b.x < a.x+a.width && b.x+b.w > a.x && b.y < a.y+a.height && b.y+b.h > a.y) {
                            // tabrakan!
                            bullets.splice(j,1);
                            // hapus asteroid dan memicu quiz
                            const asteroidId = a.id;
                            const asteroidCopy = { ...a };
                            asteroids.splice(i,1);
                            showQuizForAsteroid(asteroidCopy, asteroidId);
                            i--; // karena hapus satu asteroid
                            break;
                        }
                    }
                }
                // cek collision dengan player (apapun, mengurangi nyawa)
                if(!waitingForAnswer && gameRunning) {
                    if(playerX < a.x+a.width && playerX+PLAYER_WIDTH > a.x && playerY < a.y+a.height && playerY+PLAYER_HEIGHT > a.y) {
                        reduceHealth();
                        explosions.push({ x: a.x+a.width/2, y: a.y+a.height/2, life: 14 });
                        asteroids.splice(i,1);
                        i--;
                        if(health<=0) return;
                    }
                }
            }

            // bersihkan asteroid yang keluar bawah
            for(let i=0; i<asteroids.length; i++) {
                if(asteroids[i].y > CH + 100) {
                    asteroids.splice(i,1);
                    i--;
                }
            }

            // Spawn asteroid periodik
            if(!waitingForAnswer) {
                spawnCounter++;
                if(spawnCounter >= SPAWN_RATE) {
                    spawnCounter = 0;
                    if(asteroids.length < 12) spawnAsteroid();
                }
            }

            // update efek ledakan
            for(let i=0; i<explosions.length; i++) {
                explosions[i].life--;
                if(explosions[i].life <= 0) {
                    explosions.splice(i,1);
                    i--;
                }
            }
        }

        // ----- GAMBAR SEMUA ELEMEN -----
        function draw() {
            ctx.clearRect(0, 0, CW, CH);
            // background luar angkasa
            ctx.fillStyle = "#01011a";
            ctx.fillRect(0,0,CW,CH);
            for(let i=0;i<150;i++) {
                if(i%2 === 0) continue;
                ctx.fillStyle = `rgba(255,255,200,${Math.random()*0.5})`;
                ctx.fillRect( (i*131)%CW, (i*57)%CH, 1.5,1.5);
            }
            
            // Player (pesawat tempur keren)
            ctx.shadowBlur = 6;
            ctx.fillStyle = "#36C5F0";
            ctx.beginPath();
            ctx.roundRect(playerX, playerY, PLAYER_WIDTH, PLAYER_HEIGHT, 12);
            ctx.fill();
            ctx.fillStyle = "#F5F5DC";
            ctx.beginPath();
            ctx.moveTo(playerX+PLAYER_WIDTH/2, playerY-8);
            ctx.lineTo(playerX+PLAYER_WIDTH-8, playerY+5);
            ctx.lineTo(playerX+8, playerY+5);
            ctx.fill();
            ctx.fillStyle = "orange";
            ctx.fillRect(playerX+12, playerY+25, 12, 8);
            
            // asteroids & bullets
            for(let b of bullets) b.draw();
            for(let a of asteroids) a.draw();
            
            // Explosion effect
            for(let ex of explosions) {
                ctx.fillStyle = `rgba(255, 100, 0, ${ex.life/12})`;
                ctx.beginPath();
                ctx.arc(ex.x, ex.y, 8, 0, Math.PI*2);
                ctx.fill();
            }
            
            // QUIZ ACTIVE (jika sedang menunggu jawaban)
            if(waitingForAnswer && activeQuiz) {
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0,0,CW,CH);
                ctx.font = "bold 20px 'Segoe UI'";
                ctx.fillStyle = "#FFF8E7";
                ctx.shadowBlur = 0;
                ctx.fillText("📚 PERTANYAAN FISIKA :", CW/2-150, 80);
                ctx.font = "22px 'Courier New'";
                ctx.fillStyle = "#FFE484";
                ctx.fillText(activeQuiz.question, CW/2-200, 150);
                ctx.font = "18px monospace";
                const options = activeQuiz.options;
                for(let i=0; i<options.length; i++) {
                    let yOff = 230 + i*45;
                    ctx.fillStyle = "#CCDDFF";
                    ctx.fillText(`${i+1}. ${options[i]}`, CW/2-180, yOff);
                }
                ctx.font = "bold 16px system-ui";
                ctx.fillStyle = "#99ffcc";
                ctx.fillText("💡 Klik tombol angka (1,2,3,4) di KEYBOARD untuk menjawab!", CW/2-250, CH-50);
                // instruksi tambahan
            }
            
            // Game running tapi quiz tidak aktif, tampilkan cursor
            if(!waitingForAnswer && gameRunning){
                ctx.font = "12px monospace";
                ctx.fillStyle = "white";
                ctx.fillText("⚡", mouseX-4, 18);
            }
        }
        
        // ----- EVENT MOUSE & KEYBOARD -----
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let canvasX = (e.clientX - rect.left) * scaleX;
            canvasX = Math.min(Math.max(canvasX, 0), CW);
            mouseX = canvasX;
        }
        
        function handleShoot(e) {
            if(!gameRunning) return;
            if(waitingForAnswer) return; // saat quiz tidak bisa nembak
            e.preventDefault();
            bullets.push(new Bullet(playerX + PLAYER_WIDTH/2 - 2.5, playerY - 8));
        }
        
        function handleKeyAnswer(e) {
            if(!waitingForAnswer || !activeQuiz) return;
            const key = e.key;
            let idx = -1;
            if(key === '1') idx = 0;
            else if(key === '2') idx = 1;
            else if(key === '3') idx = 2;
            else if(key === '4') idx = 3;
            if(idx !== -1) {
                e.preventDefault();
                answerQuiz(idx);
            }
        }
        
        // ----- LOOP ANIMASI -----
        function gameLoop() {
            if(!gameRunning) return;
            updateGame();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ----- INIT EVENT & START -----
        function init() {
            updateUI();
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('click', handleShoot);
            window.addEventListener('keydown', handleKeyAnswer);
            // default mouse position
            mouseX = CW/2;
            gameRunning = true;
            gameLoop();
        }
        
        init();
    })();
</script>
</body>
</html>
